name: Backend CI

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Check ESLint
        run: npm run lint

      - name: Check Prettier
        run: npm run format:check

      - name: Run tests
        run: npm run test

      - name: Build project
        run: npm run build
